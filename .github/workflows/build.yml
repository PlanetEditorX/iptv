name: IPTV Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:

  # ============================
  # 三个构建 Job（使用 build_job.py）
  # ============================
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        name: [cctv, satellite, entertainment]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build ${{ matrix.name }}
        run: |
          rm -rf output
          python3 scripts/build_job.py ${{ matrix.name }}

          mkdir -p output_${{ matrix.name }}
          mv output/* output_${{ matrix.name }}/

      # 上传频道输出（m3u / txt）
      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.name }}
          path: output_${{ matrix.name }}/

      # 上传 raw_results + cache
      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: state-${{ matrix.name }}
          path: |
            sources/raw_results_${{ matrix.name }}.json
            scripts/cache.json

  # ============================
  # 合并 Job（唯一提交点）
  # ============================
  merge:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged/

      - name: Show merged directory structure
        run: |
          echo "=== merged 目录结构 ==="
          tree merged || ls -R merged
          echo

      # ============================
      # 恢复 raw_results + cache
      # ============================
      - name: Restore state files
        run: |
          echo "=== 恢复 raw_results_* ==="
          cp merged/state-*/raw_results_*.json sources/ || true

          echo "=== 恢复 cache.json ==="
          cp merged/state-*/cache.json scripts/ || true

      # ============================
      # 统一判刑（fail_count / source_fail / failed_sources / live_urls / README）
      # ============================
      - name: Merge state files
        run: |
          python3 scripts/merge_state_files.py

      # ============================
      # 合并频道输出
      # ============================
      - name: Merge outputs
        run: |
          mkdir -p output
          shopt -s nullglob

          echo "=== 合并 TXT ==="
          touch output/channels_all.txt
          for f in merged/output-*/channels_*.txt; do
            echo "合并：$f"
            cat "$f" >> output/channels_all.txt
            echo "" >> output/channels_all.txt
          done

          echo "=== 合并 M3U ==="
          echo "#EXTM3U" > output/channels_all.m3u
          for f in merged/output-*/channels_*.m3u; do
            echo "合并：$f"
            grep -h -v "#EXTM3U" "$f" >> output/channels_all.m3u
          done

      - name: Upload final merged output
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: output/

      # ============================
      # 最终一次性提交所有文件
      # ============================
      - name: Commit and push ALL updated files
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add scripts/*.json || true
          git add sources/*.json sources/live_urls.txt || true
          git add output/*.txt output/*.m3u || true
          git add README.md || true

          git commit -m "Unified IPTV update (raw merge + outputs)" || echo "No changes"
          git push || true
