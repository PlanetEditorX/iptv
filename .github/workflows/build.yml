name: IPTV Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:

  # ============================
  # 三个构建 Job（自动匹配输出目录）
  # ============================
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        name: [cctv, satellite, entertainment]

    steps:
      - uses: actions/checkout@v4

      # 安装依赖
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      # 构建
      - name: Build ${{ matrix.name }}
        run: |
          rm -rf output
          python3 scripts/build.py ${{ matrix.name }}

          # 自动创建 output_目录
          mkdir -p output_${{ matrix.name }}
          mv output/* output_${{ matrix.name }}/

      # ⭐ 输出当前 job 的 M3U 前 100 行
      - name: Show first 100 lines of M3U
        run: |
          echo "====== M3U Preview (first 100 lines) ======"
          head -n 100 output_${{ matrix.name }}/channels_${{ matrix.name }}.m3u || true
          echo "==========================================="

      # 上传构建产物
      - name: Upload artifact ${{ matrix.name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: output_${{ matrix.name }}/

      # 自动提交状态文件（fail_count.json / cache.json / source_fail.json）
      - name: Commit updated state files
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add scripts/cache.json scripts/fail_count.json scripts/source_fail.json || true
          git commit -m "Update state files for ${{ matrix.name }}" || echo "No changes"
          git push || true

  # ============================
  # 合并 Job
  # ============================
  merge:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged/

      - name: Merge outputs
        run: |
          mkdir -p output

          echo "合并 TXT..."
          echo "" > output/channels_all.txt
          for f in merged/*/output_*/channels_*.txt; do
            echo "合并 $f"
            cat "$f" >> output/channels_all.txt
            echo "" >> output/channels_all.txt
          done

          echo "合并 M3U..."
          echo '#EXTM3U' > output/channels_all.m3u
          for f in merged/*/output_*/channels_*.m3u; do
            echo "合并 $f"
            grep -h -v '#EXTM3U' "$f" >> output/channels_all.m3u || true
          done

      - name: Upload final merged output
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: output/

      - name: Commit and push final output
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add output/channels_all.m3u output/channels_all.txt README.md || true
          git commit -m "Update merged IPTV output" || echo "No changes"
          git push || true
