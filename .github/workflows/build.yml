name: IPTV Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */12 * * *"   # 每 12 小时兜底跑一次
  push:
    paths:
      - "sources/local_spider.m3u"   # 只有 spider 源变化才触发
  workflow_dispatch:   # 手动触发

jobs:

  # ============================
  # 三个构建 Job（使用 build_job.py）
  # ============================
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        name: [cctv, satellite, entertainment]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build ${{ matrix.name }}
        run: |
          python3 scripts/build_job.py ${{ matrix.name }}
          ls -l output
          rm -rf output/channels_all.* || true

      # 上传频道输出（m3u / txt）
      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.name }}
          path: output/

      # 上传 raw_results + cache
      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: state-${{ matrix.name }}
          path: |
            sources/state/raw_results_${{ matrix.name }}.json
            sources/state/cache.json

  # ============================
  # 合并 Job（唯一提交点）
  # ============================
  merge:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged/

      - name: Show merged directory structure
        run: |
          echo "=== merged 目录结构 ==="
          tree merged || ls -R merged
          echo

      # ============================
      # 恢复 raw_results
      # ============================
      - name: Restore state files
        run: |
          echo "=== 恢复 raw_results_* ==="
          mkdir -p sources/state
          cp merged/state-*/raw_results_*.json sources/state/ || true


      # ============================
      # 合并 cache.json（关键步骤）
      # ============================
      - name: Merge cache.json
        run: |
          python3 scripts/merge_cache.py

      # ============================
      # 统一判刑（stream_fail / upstream_blocklist / live_urls / README）
      # ============================
      - name: Merge state files
        run: |
          python3 scripts/merge_state_files.py

      # ============================
      # 合并频道输出
      # ============================
      - name: Merge outputs
        run: |
          mkdir -p output
          shopt -s nullglob
          shopt -s globstar

          echo "=== 查找所有 M3U 文件 ==="
          find merged -name "channels_*.m3u"

          echo "=== 输出每个 M3U 的前 100 行（用于调试） ==="
          for f in $(find merged -name "channels_*.m3u"); do
            echo "----- $f -----"
            head -n 100 "$f" || true
            echo
          done

          echo "=== 合并 TXT ==="
          touch output/channels_all.txt

          txt_files=( $(find merged -name "channels_*.txt") )

          if [ ${#txt_files[@]} -eq 0 ]; then
            echo "⚠️ 没有任何 TXT 文件可合并" >> output/channels_all.txt
          else
            for f in "${txt_files[@]}"; do
              echo "合并：$f"
              cat "$f" >> output/channels_all.txt
              echo "" >> output/channels_all.txt
            done
          fi

          echo "=== 合并 M3U ==="
          echo "#EXTM3U" > output/channels_all.m3u

          m3u_files=( $(find merged -name "channels_*.m3u") )

          if [ ${#m3u_files[@]} -eq 0 ]; then
            echo "⚠️ 没有任何 M3U 文件可合并"
          else
            for f in "${m3u_files[@]}"; do
              echo "合并：$f"
              grep -a -h -v "#EXTM3U" "$f" >> output/channels_all.m3u || true
            done
          fi

      - name: Upload final merged output
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: output/

      # ============================
      # 清理 raw_results
      # ============================
      - name: Cleanup raw_results
        run: |
          echo "=== 清理 raw结果 ==="
          rm -f sources/state/raw_results_*.json || true

          echo "=== 清理 黑名单过滤  ==="
          rm -f merged/output-*/filtered_*.json || true

      # ============================
      # 最终一次性提交所有文件
      # ============================
      - name: Commit and push ALL updated files
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 只提交真正需要跨运行保存的状态文件
          git add sources/state/stream_fail.json || true
          git add sources/state/upstream_blocklist.json || true
          git add sources/state/upstream_fail.json || true
          git add sources/live_urls.txt || true
          git add sources/state/cache.json || true

          # 提交最终输出
          git add output/*.txt output/*.m3u || true

          # 提交 README
          git add README.md || true

          git commit -m "IPTV Update" || echo "No changes"
          git push || true
