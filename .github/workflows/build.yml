name: IPTV Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */12 * * *"   # 每 12 小时兜底跑一次
  push:
    paths:
      - "sources/local_spider.m3u"   # 只有 spider 源变化才触发
  workflow_dispatch:   # 手动触发


jobs:
  # ============================
  # 检查自建 Runner 是否在线
  # ============================
  check-runner:
    runs-on: ubuntu-latest
    outputs:
      local_available: ${{ steps.check.outputs.local_available }}
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - id: check
        run: |
          RUNNERS=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            https://api.github.com/orgs/${{ github.repository_owner }}/actions/runners \
            | jq -r '.runners // [] | .[] | select(.status=="online") | .name')

          if [[ -n "$RUNNERS" ]]; then
            echo "local_available=true" >> $GITHUB_OUTPUT
            echo "Result: Self-hosted runner FOUND"
          else
            echo "local_available=false" >> $GITHUB_OUTPUT
            echo "Result: No self-hosted runner online"
          fi

  # ============================
  # 三个构建 Job
  # ============================
  build:
    needs: check-runner
    runs-on: ${{ needs.check-runner.outputs.local_available == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    strategy:
      matrix:
        name: [cctv, satellite, entertainment]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (cloud only)
        if: runner.environment != 'self-hosted'
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Install Python libs (self-hosted only)
        if: runner.environment == 'self-hosted'
        run: |
          pip3 install --user pillow numpy opencv-python-headless || true

      - name: Build ${{ matrix.name }}
        run: |
          rm -rf output
          python3 scripts/build_job.py ${{ matrix.name }}

          mkdir -p output_${{ matrix.name }}
          mv output/* output_${{ matrix.name }}/

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.name }}
          path: output_${{ matrix.name }}/

      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: state-${{ matrix.name }}
          path: |
            sources/state/raw_results_${{ matrix.name }}.json
            sources/state/cache.json

  # ============================
  # 合并 Job（唯一提交点）
  # ============================
  merge:
    needs: [check-runner, build]
    runs-on: ${{ needs.check-runner.outputs.local_available == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    outputs:
      push_status: ${{ steps.push_step.outputs.push_status }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged/

      - name: Show merged directory structure
        run: |
          echo "=== merged 目录结构 ==="
          tree merged || ls -R merged
          echo

      - name: Restore state files
        run: |
          cp merged/state-*/raw_results_*.json sources/state/ || true
          mkdir -p merged/cache_list/
          cp merged/state-*/cache.json merged/cache_list/ || true

      - name: Merge cache.json
        run: python3 scripts/merge_cache.py

      - name: Merge state files
        run: python3 scripts/merge_state_files.py

      - name: Merge outputs
        run: |
          mkdir -p output
          shopt -s nullglob

          echo "=== 合并 TXT ==="
          touch output/channels_all.txt
          for f in merged/output-*/channels_*.txt; do
            echo "合并：$f"
            cat "$f" >> output/channels_all.txt
            echo "" >> output/channels_all.txt
          done

          echo "=== 合并 M3U ==="
          echo "#EXTM3U" > output/channels_all.m3u
          for f in merged/output-*/channels_*.m3u; do
            echo "合并：$f"
            grep -a -h -v "#EXTM3U" "$f" >> output/channels_all.m3u || true
          done

      - name: Upload final merged output
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: output/

      - name: Cleanup raw_results
        run: |
          rm -f sources/state/raw_results_*.json || true
          rm -f merged/output-*/filtered_*.json || true

      # ============================
      # 本地尝试 push
      # ============================
      - name: Try local push
        id: push_step
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add sources/state/*.json || true
          git add sources/live_urls.txt || true
          git add output/*.txt output/*.m3u || true
          git add README.md || true

          git commit -m "IPTV Update" || echo "No changes"

          echo "🔄 Trying local push..."
          if git push; then
            echo "push_status=success" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "push_status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact for cloud push
        if: steps.push_step.outputs.push_status == 'failed'
        uses: actions/upload-artifact@v4
        with:
          name: iptv-output
          path: |
            sources/state/*.json
            sources/live_urls.txt
            output/*.txt
            output/*.m3u
            README.md

  # ============================
  # 云端 fallback push
  # ============================
  push_fallback:
    needs: merge
    if: needs.merge.outputs.push_status == 'failed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: iptv-output
          path: iptv-output

      - name: Apply updated files
        run: |
          cp -f iptv-output/*.json sources/state/ || true
          cp -f iptv-output/live_urls.txt sources/ || true
          cp -f iptv-output/*.txt output/ || true
          cp -f iptv-output/*.m3u output/ || true
          cp -f iptv-output/README.md README.md || true

      - name: Commit and push from cloud runner
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add sources/state/*.json || true
          git add sources/live_urls.txt || true
          git add output/*.txt output/*.m3u || true
          git add README.md || true

          git commit -m "IPTV Update (cloud fallback)" || echo "No changes"
          git push
