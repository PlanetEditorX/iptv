name: IPTV Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:

  # ============================
  # CCTV 构建
  # ============================
  cctv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build CCTV
        run: python3 scripts/build.py cctv

      - name: Upload CCTV artifact
        uses: actions/upload-artifact@v4
        with:
          name: cctv
          path: output/

  # ============================
  # 卫视 构建
  # ============================
  satellite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build Satellite
        run: python3 scripts/build.py satellite

      - name: Upload Satellite artifact
        uses: actions/upload-artifact@v4
        with:
          name: satellite
          path: output/

  # ============================
  # 娱乐频道 构建
  # ============================
  entertainment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build Entertainment
        run: python3 scripts/build.py entertainment

      - name: Upload Entertainment artifact
        uses: actions/upload-artifact@v4
        with:
          name: entertainment
          path: output/

  # ============================
  # 合并 Job（依赖前 3 个 Job）
  # ============================
  merge:
    runs-on: ubuntu-latest
    needs: [cctv, satellite, entertainment]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged/

      - name: Merge outputs
        run: |
          mkdir -p output

          echo "合并 TXT..."
          touch output/channels_all.txt
          for f in merged/*/*.txt; do
            if [ -f "$f" ]; then
              echo "合并 $f"
              cat "$f" >> output/channels_all.txt
              echo "" >> output/channels_all.txt
            fi
          done

          echo "合并 M3U..."
          echo '#EXTM3U' > output/channels_all.m3u
          for f in merged/*/*.m3u; do
            if [ -f "$f" ]; then
              echo "合并 $f"
              grep -h -v '#EXTM3U' "$f" >> output/channels_all.m3u
            fi
          done

      - name: Upload final merged output
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: output/

      - name: Commit and push final output
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add output/channels_all.m3u output/channels_all.txt || true
          git commit -m "Update merged IPTV output" || echo "No changes to commit"
          git push || true
