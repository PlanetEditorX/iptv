name: IPTV Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:

  # ============================
  # 三个构建 Job（使用 build_job.py）
  # ============================
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        name: [cctv, satellite, entertainment]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build ${{ matrix.name }}
        run: |
          rm -rf output
          python3 scripts/build_job.py ${{ matrix.name }}

          mkdir -p output_${{ matrix.name }}
          mv output/* output_${{ matrix.name }}/

      # 上传频道输出（m3u / txt）
      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.name }}
          path: output_${{ matrix.name }}/

      # 上传 raw_results + cache
      - name: Upload state artifact
        uses: actions/upload-artifact@v4
        with:
          name: state-${{ matrix.name }}
          path: |
            sources/raw_results_${{ matrix.name }}.json
            scripts/cache.json

  # ============================
  # 合并 Job（唯一提交点）
  # ============================
  merge:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged/

      - name: Show merged directory structure
        run: |
          echo "=== merged 目录结构 ==="
          tree merged || ls -R merged
          echo

      # ============================
      # 恢复 raw_results + cache
      # ============================
      - name: Restore state files
        run: |
          echo "=== 恢复 raw_results_* ==="
          cp merged/state-*/sources/raw_results_*.json sources/ || true

          echo "=== 恢复 cache.json ==="
          cp merged/state-*/scripts/cache.json scripts/ || true

      # ============================
      # 统一判刑（fail_count / source_fail / failed_sources / live_urls / README）
      # ============================
      - name: Merge state files
        run: |
          python3 scripts/merge_state_files.py

      # ============================
      # 合并频道输出
      # ============================
      - name: Merge outputs
        run: |
          mkdir -p output
          shopt -s nullglob

          echo "=== 合并 TXT ==="
          touch output/channels_all.txt

          txt_files=(merged/output-*/channels_*.txt)

          if [ ${#txt_files[@]} -eq 0 ]; then
            echo "⚠️ 没有任何 TXT 文件可合并" >> output/channels_all.txt
          else
            for f in "${txt_files[@]}"; do
              echo "合并：$f"
              cat "$f" >> output/channels_all.txt
              echo "" >> output/channels_all.txt
            done
          fi


          echo "=== 合并 M3U ==="
          echo "#EXTM3U" > output/channels_all.m3u

          m3u_files=(merged/output-*/channels_*.m3u)

          if [ ${#m3u_files[@]} -eq 0 ]; then
            echo "⚠️ 没有任何 M3U 文件可合并"
          else
            for f in "${m3u_files[@]}"; do
              echo "合并：$f"
              # -a：强制按文本处理，避免二进制错误
              # -h：不显示文件名
              # -v "#EXTM3U"：去掉头部
              grep -a -h -v "#EXTM3U" "$f" >> output/channels_all.m3u || true
            done
          fi

      - name: Upload final merged output
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: output/

      # ============================
      # 清理 raw_results
      # ============================
      - name: Cleanup raw_results
        run: |
          echo "=== 清理 raw_results_* ==="
          rm -f sources/raw_results_*.json || true

      # ============================
      # 最终一次性提交所有文件
      # ============================
      - name: Commit and push ALL updated files
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 只提交真正需要跨运行保存的状态文件
          git add scripts/fail_count.json || true
          git add sources/failed_sources.json sources/live_urls.txt || true

          # 提交最终输出
          git add output/*.txt output/*.m3u || true

          # 提交 README
          git add README.md || true

          git commit -m "Unified IPTV Update" || echo "No changes"
          git push || true