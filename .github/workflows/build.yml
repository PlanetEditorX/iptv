name: IPTV Build

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:

  # ============================
  # CCTV 构建
  # ============================
  cctv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build CCTV
        run: |
          python3 scripts/build.py cctv

      - name: Upload CCTV artifact
        uses: actions/upload-artifact@v4
        with:
          name: cctv
          path: output/

  # ============================
  # 卫视 构建
  # ============================
  satellite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build Satellite
        run: |
          python3 scripts/build.py satellite

      - name: Upload Satellite artifact
        uses: actions/upload-artifact@v4
        with:
          name: satellite
          path: output/

  # ============================
  # 娱乐频道 构建
  # ============================
  entertainment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build Entertainment
        run: |
          python3 scripts/build.py entertainment

      - name: Upload Entertainment artifact
        uses: actions/upload-artifact@v4
        with:
          name: entertainment
          path: output/

  # ============================
  # 合并 Job（依赖前 3 个 Job）
  # ============================
  merge:
    runs-on: ubuntu-latest
    needs: [cctv, satellite, entertainment]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged/

      - name: Merge outputs
        run: |
          mkdir -p output

          # 合并 TXT
          cat merged/cctv/channels_cctv.txt \
              merged/satellite/channels_satellite.txt \
              merged/entertainment/channels_entertainment.txt \
              > output/channels_all.txt

          # 合并 M3U（去掉重复 EXTM3U 头）
          echo '#EXTM3U' > output/channels_all.m3u
          grep -h -v '#EXTM3U' merged/cctv/channels_cctv.m3u >> output/channels_all.m3u
          grep -h -v '#EXTM3U' merged/satellite/channels_satellite.m3u >> output/channels_all.m3u
          grep -h -v '#EXTM3U' merged/entertainment/channels_entertainment.m3u >> output/channels_all.m3u

      - name: Upload final merged output
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: output/
