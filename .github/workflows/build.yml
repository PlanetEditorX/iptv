name: IPTV Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:

  # ============================
  # 三个构建 Job
  # ============================
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        name: [cctv, satellite, entertainment]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip
          pip3 install pillow numpy opencv-python-headless

      - name: Build ${{ matrix.name }}
        run: |
          rm -rf output
          python3 scripts/build.py ${{ matrix.name }}

          mkdir -p output_${{ matrix.name }}
          mv output/* output_${{ matrix.name }}/

      - name: Upload artifact ${{ matrix.name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: output_${{ matrix.name }}/

  # ============================
  # 合并 Job
  # ============================
  merge:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged/

      - name: Show merged directory structure
        run: |
          echo "=== merged 目录结构 ==="
          tree merged || ls -R merged
          echo

      - name: Merge outputs (safe even if no files)
        run: |
          mkdir -p output
          shopt -s nullglob

          echo "=== 合并 TXT ==="
          touch output/channels_all.txt
          txt_files=(merged/*/channels_*.txt)
          for f in "${txt_files[@]}"; do
            echo "合并：$f"
            cat "$f" >> output/channels_all.txt
            echo "" >> output/channels_all.txt
          done

          echo
          echo "=== 合并 M3U ==="
          echo "#EXTM3U" > output/channels_all.m3u
          m3u_files=(merged/*/channels_*.m3u)
          for f in "${m3u_files[@]}"; do
            echo "合并：$f"
            grep -h -v '#EXTM3U' "$f" >> output/channels_all.m3u || true
          done

          echo
          echo "=== 合并完成 ==="
          ls -lh output

      - name: Upload final merged output
        uses: actions/upload-artifact@v4
        with:
          name: final
          path: output/

      # ============================
      # 提交所有文件
      # ============================
      - name: Commit and push ALL updated files
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 所有 JSON（scripts/ + sources/）
          git add scripts/*.json || true
          git add sources/*.json sources/live_urls.txt || true

          # 所有输出文件（channels_xxx + channels_all）
          git add output/*.txt output/*.m3u || true

          # README
          git add README.md || true

          git commit -m "Update IPTV outputs and state files (single unified commit)" || echo "No changes"
          git push || true
